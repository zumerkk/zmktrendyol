
services:
  postgres:
    image: postgres:15-alpine
    container_name: zmk-postgres
    environment:
      POSTGRES_USER: zmkuser
      POSTGRES_PASSWORD: zmkpass
      POSTGRES_DB: zmktrendyol
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zmk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
